<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학 지원 현황</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>2024 대학 지원 현황</h1>
                <p>💌 총 10개 프로그램 지원 | 3개 합격 🎉</p>
            </div>
        </header>

        <main>


            <section class="universities">
                <div id="university-list" class="university-container">
                    <!-- 동적으로 생성됨 -->
                </div>
            </section>

            <section class="stats">
                <div class="stat-card">
                    <h3>총 지원</h3>
                    <p class="stat-number">10</p>
                </div>
                <div class="stat-card highlight">
                    <h3>합격</h3>
                    <p class="stat-number">3</p>
                </div>
            </section>

            <section class="post-acceptance">
                <h2>🎓 합격 후 준비사항</h2>
                <div class="checklist">
                    <div class="checklist-item">
                        <span class="item-number">1</span>
                        <span class="item-text">잔고증명서 준비 (약 $25,000~$30,000 이상)</span>
                    </div>
                    <div class="checklist-item">
                        <span class="item-number">2</span>
                        <span class="item-text">I-20 받기 (Confirmation of Enrollment)</span>
                    </div>
                    <div class="checklist-item">
                        <span class="item-number">3</span>
                        <span class="item-text">SEVIS 등록 및 수수료 결제</span>
                    </div>
                    <div class="checklist-item">
                        <span class="item-number">4</span>
                        <span class="item-text">
                            미국 학생비자 (F-1 Visa) 신청
                            <ul class="sub-items">
                                <li>비자 면접 신청 및 일정 예약</li>
                                <li>미국 대사관(서울) 방문</li>
                            </ul>
                        </span>
                    </div>
                    <div class="checklist-item">
                        <span class="item-number">5</span>
                        <span class="item-text">기숙사 신청 및 숙소 예약</span>
                    </div>
                    <div class="checklist-item">
                        <span class="item-number">6</span>
                        <span class="item-text">항공권 예매</span>
                    </div>
                    <div class="checklist-item">
                        <span class="item-number">7</span>
                        <span class="item-text">학비 납부</span>
                    </div>
                    <div class="checklist-item">
                        <span class="item-number">8</span>
                        <span class="item-text">수강신청 및 학사일정 확인</span>
                    </div>
                </div>
            </section>
        </main>

        <footer>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
